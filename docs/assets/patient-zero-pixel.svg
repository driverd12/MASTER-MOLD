<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Patient Zero pixel art banner</title>
  <desc id="desc">Pixel-art banner for Patient Zero, Agent Office, and the local-first MCP control plane.</desc>
  <rect width="960" height="320" fill="#12161f"/>
  <rect x="0" y="0" width="960" height="320" fill="url(#grid)"/>

  <g transform="translate(72 54) scale(10)">
    <rect x="4" y="0" width="8" height="2" fill="#e9edf6"/>
    <rect x="3" y="2" width="10" height="1" fill="#e9edf6"/>
    <rect x="2" y="3" width="12" height="1" fill="#e9edf6"/>
    <rect x="2" y="4" width="12" height="2" fill="#e9edf6"/>
    <rect x="1" y="6" width="14" height="1" fill="#e9edf6"/>
    <rect x="1" y="7" width="14" height="4" fill="#e9edf6"/>
    <rect x="2" y="11" width="12" height="2" fill="#e9edf6"/>
    <rect x="3" y="13" width="2" height="2" fill="#e9edf6"/>
    <rect x="6" y="13" width="2" height="3" fill="#e9edf6"/>
    <rect x="9" y="13" width="2" height="3" fill="#e9edf6"/>
    <rect x="12" y="13" width="2" height="2" fill="#e9edf6"/>
    <rect x="4" y="6" width="3" height="3" fill="#ff7a66"/>
    <rect x="9" y="6" width="3" height="3" fill="#ff7a66"/>
    <rect x="6" y="10" width="4" height="1" fill="#12161f"/>
  </g>

  <g transform="translate(310 76)">
    <text x="0" y="0" fill="#ff7a66" font-family="Menlo, Monaco, Consolas, monospace" font-size="22" letter-spacing="3">PATIENT ZERO</text>
    <text x="0" y="66" fill="#f7f9fc" font-family="Menlo, Monaco, Consolas, monospace" font-size="64" font-weight="700">AGENT OFFICE</text>
    <text x="0" y="108" fill="#a9b4cb" font-family="Menlo, Monaco, Consolas, monospace" font-size="26">LOCAL-FIRST MCP SERVER + AUTONOMY FABRIC</text>
    <text x="0" y="156" fill="#d6deef" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">
      IDE BRIDGES • TERMINAL CLI AGENTS • OFFICE COUNCIL • HOST CONTROL • AUDITED EXECUTION
    </text>
    <rect x="0" y="188" width="498" height="2" fill="#2b3344"/>
    <text x="0" y="228" fill="#7dd3fc" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">Agent Office is the operator surface.</text>
    <text x="0" y="254" fill="#7dd3fc" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">Patient Zero is the fully-armed local execution posture.</text>
  </g>

  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1d2330" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
